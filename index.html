<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --sidebar-bg: #161b22;
      --border-color: #30363d;
      --text-main: #e6edf3;
      --text-muted: #8b949e;
      --accent-blur: rgba(56, 139, 253, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* --- Sidebar Section --- */
    .sidebar {
      width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
    }

    .logo-container {
      padding: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-items {
      flex: 1;
      padding: 0 12px;
    }

    .menu-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 4px;
      transition: background 0.2s, color 0.2s;
    }

    .menu-item:hover {
      background: #21262d;
      color: var(--text-main);
    }

    .menu-item.active {
      background: #21262d;
      color: white;
    }

    /* --- Main Content Section --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg-dark);
    }

    .header {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(13, 17, 23, 0.8);
      backdrop-filter: blur(10px);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centering chat for that Claude look */
    }

    .chat-content {
      width: 100%;
      max-width: 800px; /* Standard reading width */
    }

    /* --- Input Area --- */
    .input-area {
      padding: 20px;
      display: flex;
      justify-content: center;
      background: linear-gradient(transparent, var(--bg-dark) 20%);
    }

    .input-wrapper {
      width: 100%;
      max-width: 800px;
      position: relative;
      background: #161b22;
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px;
      transition: border-color 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: #58a6ff;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      background: transparent;
      border: none;
      color: white;
      resize: none;
      outline: none;
      font-size: 16px;
      line-height: 1.5;
      padding: 8px;
    }

    /* Responsive Adjustments */
    @media (max-width: 768px) {
      .sidebar {
        width: 0;
        position: absolute;
        z-index: 10;
        height: 100%;
      }
      .main {
        width: 100%;
      }
      .chat-content, .input-wrapper {
        max-width: 100%;
      }
    }

    /* Webview for Facebook */
    #fbView {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>

<div id="app">
  <aside class="sidebar">
    <div class="logo-container">
      <div style="width: 24px; height: 24px; background: #d97757; border-radius: 4px;"></div>
      Claude Code
    </div>
    <div class="nav-items">
      <div class="menu-item active">New Chat</div>
      <div class="menu-item">History</div>
      <div class="menu-item">Settings</div>
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <div style="font-weight: 500;">Claude 3.5 Sonnet</div>
      <div style="color: var(--text-muted); font-size: 12px;">Pro Plan</div>
    </header>

    <div class="chat-container">
      <div class="chat-content">
        <h2 style="text-align: center; margin-top: 20vh; color: var(--text-muted); font-weight: 400;">
          How can I help you today?
        </h2>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea placeholder="Ask anything..."></textarea>
        <div style="display: flex; justify-content: flex-end; margin-top: 8px;">
          <button style="background: #30363d; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer;">
            Send
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<webview id="fbView" src="https://www.facebook.com"></webview>

<script src="renderer.js"></script>
</body>
</html>
